<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CARTEL CITY RP - تقديم رجال القانون</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="overlay">

<header>
<img src="logo.png" class="logo-img">
<div class="logo-text">CARTEL CITY RP</div>
</header>

<div class="nav">
<a href="index.html">التقديم</a>
<a href="rules.html">القوانين</a>
</div>

<div class="section">

<h2>استبيان التقديم لرجال القانون 👮‍♂️</h2>

<form id="applyForm">

<input type="text" id="name" placeholder="اسمك داخل السيرفر" required>
<input type="text" id="discord" placeholder="Discord ID" required>
<input type="number" id="age" placeholder="عمرك" required>
<input type="number" id="hours" placeholder="كم ساعة لعب عندك؟" required>

<select id="mic">
<option value="">هل لديك مايك ممتاز؟</option>
<option>نعم</option>
<option>لا</option>
</select>

<select id="record">
<option value="">هل سبق تبندت؟</option>
<option>نعم</option>
<option>لا</option>
</select>

<textarea id="why" placeholder="ليش نشوفك مناسب لرجال القانون؟" required></textarea>

<h3>اختبار تقييم الشرطي</h3>

<p>1- شفت شخص يطلق بدون سبب (RDM)، شنو أول تصرف تسويه؟</p>
<textarea id="q1" required></textarea>

<p>2- شخص هرب بعد ما طلبت منه يوقف. شلون تتعامل مع الحالة؟</p>
<textarea id="q2" required></textarea>

<p>3- مشتبه فيه ما يتجاوب بالكلام. شنو الإجراء الصحيح؟</p>
<textarea id="q3" required></textarea>

<button type="submit">إرسال الطلب</button>

</form>

</div>

</div>

<script>
const WEBHOOK_URL = "PUT_YOUR_WEBHOOK_HERE";

document.getElementById("applyForm").addEventListener("submit", async function(e){
e.preventDefault();

const data = {
embeds:[{
title:"طلب انضمام لرجال القانون",
color:16711680,
fields:[
{name:"الاسم", value:document.getElementById("name").value},
{name:"Discord ID", value:document.getElementById("discord").value},
{name:"العمر", value:document.getElementById("age").value},
{name:"ساعات اللعب", value:document.getElementById("hours").value},
{name:"هل لديه مايك", value:document.getElementById("mic").value},
{name:"سجل سابق (باند)", value:document.getElementById("record").value},
{name:"ليش مناسب", value:document.getElementById("why").value},
{name:"سؤال 1", value:document.getElementById("q1").value},
{name:"سؤال 2", value:document.getElementById("q2").value},
{name:"سؤال 3", value:document.getElementById("q3").value}
],
footer:{text:"CARTEL CITY RP - Police Department"}
}]
};

await fetch(WEBHOOK_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

alert("🚔 تم إرسال طلبك بنجاح");
document.getElementById("applyForm").reset();
});
</script>

</body>
</html>
